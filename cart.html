<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart — Hexa Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="bg-gray-50 text-gray-800">
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="/" class="text-2xl font-bold text-indigo-600">HexaShop</a>
      <a href="/" class="text-sm">Continue shopping</a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-semibold mb-6">Shopping Cart</h1>
    <div id="cart-container">
      <!-- Cart items via JS -->
    </div>
    <div class="mt-6 flex justify-end">
      <button id="checkout" class="bg-indigo-600 text-white px-4 py-2 rounded-md">Checkout</button>
    </div>
  </main>

  <script src="/assets/js/products.js" defer></script>
  <script>
  // Cart logic inline for simplicity
  function formatPrice(p){return '$'+(p/100).toFixed(2)}
  function getCart(){return JSON.parse(localStorage.getItem('hx_cart')||'{}')}
  function saveCart(c){localStorage.setItem('hx_cart', JSON.stringify(c)); updateCount();}
  function updateCount(){const c=getCart(); let n=0; Object.values(c).forEach(i=>n+=i.qty); document.querySelectorAll('#cart-count').forEach(el=>el.textContent=n)}
  function renderCart(){const c=getCart(); const container=document.getElementById('cart-container'); container.innerHTML=''; if(Object.keys(c).length===0){container.innerHTML='<p class="text-gray-600">Your cart is empty.</p>'; return}
    const table=document.createElement('div'); table.className='space-y-4'; let subtotal=0;
    Object.keys(c).forEach(id=>{const item=c[id]; const p=ITEMS.find(x=>x.id===id); subtotal+=p.price_cents*item.qty;
      const row=document.createElement('div'); row.className='bg-white p-4 rounded-md flex items-center gap-4';
      row.innerHTML=`<img src="${p.image}" class="w-20 h-20 object-cover rounded" alt="${p.name}"><div class="flex-1"><div class="font-semibold">${p.name}</div><div class="text-sm text-gray-600">${formatPrice(p.price_cents)}</div></div><div class="flex items-center gap-2"><button class="qty-decr px-2 py-1 bg-gray-100 rounded">-</button><span class="w-6 text-center">${item.qty}</span><button class="qty-incr px-2 py-1 bg-gray-100 rounded">+</button></div><div class="w-24 text-right font-semibold">${formatPrice(p.price_cents*item.qty)}</div>`;
      table.appendChild(row);
      row.querySelector('.qty-incr').addEventListener('click',()=>{c[id].qty++; saveCart(c); renderCart();});
      row.querySelector('.qty-decr').addEventListener('click',()=>{if(c[id].qty>1){c[id].qty--; } else {delete c[id];} saveCart(c); renderCart();});
    });
    const totalRow=document.createElement('div'); totalRow.className='text-right mt-4'; totalRow.innerHTML=`<div class="text-lg font-semibold">Subtotal: ${formatPrice(subtotal)}</div>`;
    container.appendChild(table); container.appendChild(totalRow);
  }
  document.addEventListener('DOMContentLoaded',()=>{renderCart(); updateCount(); document.getElementById('checkout').addEventListener('click',()=>{const c=getCart(); if(Object.keys(c).length===0){alert('Your cart is empty'); return} // Simulate checkout
    const orders=JSON.parse(localStorage.getItem('hx_orders')||'[]'); orders.push({id:Date.now(),items:c,created_at:new Date().toISOString()}); localStorage.setItem('hx_orders',JSON.stringify(orders)); localStorage.removeItem('hx_cart'); alert('Order placed — thank you!'); window.location='/account.html';});});
  </script>
</body>
</html>
