<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Account — Hexa Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="bg-gray-50 text-gray-800">
  <header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="/" class="text-2xl font-bold text-indigo-600">HexaShop</a>
      <a href="/" class="text-sm">Home</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-semibold mb-6">Account</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <section class="bg-white p-6 rounded-md">
        <h2 class="font-semibold mb-4">Login</h2>
        <form id="login-form" class="space-y-3">
          <input id="login-email" placeholder="Email" class="w-full border px-3 py-2 rounded" required>
          <input id="login-password" type="password" placeholder="Password" class="w-full border px-3 py-2 rounded" required>
          <button class="bg-indigo-600 text-white px-4 py-2 rounded">Login</button>
        </form>
      </section>

      <section class="bg-white p-6 rounded-md">
        <h2 class="font-semibold mb-4">Sign up</h2>
        <form id="signup-form" class="space-y-3">
          <input id="signup-name" placeholder="Full name" class="w-full border px-3 py-2 rounded" required>
          <input id="signup-email" placeholder="Email" class="w-full border px-3 py-2 rounded" required>
          <input id="signup-password" type="password" placeholder="Password" class="w-full border px-3 py-2 rounded" required>
          <button class="bg-green-600 text-white px-4 py-2 rounded">Create account</button>
        </form>
      </section>
    </div>

    <section class="mt-8 bg-white p-6 rounded-md">
      <h2 class="font-semibold mb-4">Order history</h2>
      <div id="orders">Loading...</div>
    </section>
  </main>

  <script>
    function showOrders(){const orders=JSON.parse(localStorage.getItem('hx_orders')||'[]'); const el=document.getElementById('orders'); if(orders.length===0){el.innerHTML='<p class="text-gray-600">No orders yet.</p>'; return} el.innerHTML=''; orders.slice().reverse().forEach(o=>{const div=document.createElement('div'); div.className='border-b py-3'; div.innerHTML=`<div class="flex justify-between"><div class="font-semibold">Order ${o.id}</div><div class="text-sm text-gray-600">${new Date(o.created_at).toLocaleString()}</div></div>`; el.appendChild(div);}); }
    document.addEventListener('DOMContentLoaded',()=>{showOrders();
      document.getElementById('signup-form').addEventListener('submit',e=>{e.preventDefault(); const name=document.getElementById('signup-name').value; const email=document.getElementById('signup-email').value; const pw=document.getElementById('signup-password').value; const users=JSON.parse(localStorage.getItem('hx_users')||'[]'); users.push({id:Date.now(),name,email,password:pw}); localStorage.setItem('hx_users',JSON.stringify(users)); alert('Account created — you are logged in'); localStorage.setItem('hx_user',JSON.stringify({name,email})); window.location='/';});
      document.getElementById('login-form').addEventListener('submit',e=>{e.preventDefault(); const email=document.getElementById('login-email').value; const pw=document.getElementById('login-password').value; const users=JSON.parse(localStorage.getItem('hx_users')||'[]'); const user=users.find(u=>u.email===email && u.password===pw); if(user){localStorage.setItem('hx_user',JSON.stringify({name:user.name,email:user.email})); alert('Logged in'); window.location='/';} else {alert('Invalid credentials')} }); });
  </script>
</body>
</html>
